# Norma Relay Bot Configuration
# Environment variables override these settings with RELAY_ prefix
# Example: RELAY_TELEGRAM_TOKEN=my-token

relay:
  # Provider id from runtime providers registry used for relay sessions.
  provider: ""

  telegram:
    # Telegram bot token (required)
    # Set via RELAY_TELEGRAM_TOKEN env var
    token: ""
    # Formatting mode for final agent replies:
    # - markdownv2: convert markdown to Telegram MarkdownV2 (default)
    # - html: send text with Telegram HTML parse mode
    # - none: send plain text without parse_mode
    formatting_mode: "markdownv2"

    # Optional webhook configuration
    webhook:
      # Register outgoing Telegram webhook URL.
      # Required when webhook.enabled=true.
      url: ""
      # Optional Telegram webhook auth token protection.
      auth_token: ""
      # Enable local HTTP endpoint for incoming Telegram webhook updates.
      # If false, relay uses polling mode.
      enabled: false
      # Local bind address for webhook endpoint.
      listen_addr: "0.0.0.0:8080"
      # Local HTTP path that receives webhook updates.
      path: "/telegram/webhook"

  logger:
    level: "info"
    pretty: true

  # Optional repo/root directory for relay runtime.
  # If empty, current process directory is used.
  working_dir: ""

  # Relay app state directory.
  # Stores migration-managed relay.db (owner/app KV, session metadata, telegram polling offset).
  # Relative paths are resolved from relay.working_dir.
  state_dir: ".config/relay"

  workspace:
    # Workspace mode:
    # - on: always use git worktrees per session
    # - off: run agents in relay working_dir directly
    # - auto: use worktrees only when working_dir is a git repo
    # In on mode, relay fails fast if working_dir is not a git repository.
    mode: "auto"
    # Base branch used for workspace branching/import/export.
    # If empty, relay resolves from current HEAD branch at startup.
    base_branch: ""

  # Extra MCP server IDs (from runtime.mcp_servers) injected into every relay-started session.
  # Effective MCP IDs are: bundled default `relay` + agent mcp_servers + relay.mcp_servers.
  # Removed built-in IDs such as runtime.state, relay.state, and relay.providers are rejected.
  mcp_servers: []

  # Optional relay-wide global instruction applied to all sessions.
  # Applied before runtime.providers.<provider_id>.system_instructions when both are set.
  global_instruction: ""
